<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="CSS/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <title>Contact</title>
</head>
<body>
    <header>
        <nav>
            <div class="navbar">
                <div class="navbar-container">
                    <div class="logo-container">
                        <h1 class="logo">KINO</h1>
                    </div>
                    <div class="menu-container">
                        <ul class="menu-list">
                            <a href="index.html"><li class="menu-list-item active">Home</li></a>

                    </div>
                    <div class="profile-container">
                        <img class="profile-picture" src="img/Petra.jpg" alt="Profile Picture">

                            <i class="fa-solid fa-caret-down"></i>

                        <div class="toggle">

                            <div class="toggle-ball"></div>

                    </div>
                </div>
            </div>
            <div class="sidebar">
                <a href="contact.html">
                    <i class="left-menu-icon fa-solid fa-address-book"></i>
                </a>
                <a href="reviews.html">

    <footer>
        <h2>Creator: Lizi Arutinov, professional film and series watcher</h2>
